# ShardingSphere-Proxy — 多主分库中间件 (3分片)
# 后端对应 3 个 MySQL: mysql-shard-0/1/2

replicas: 2

image:
  repository: apache/shardingsphere-proxy
  tag: "5.5.0"

computeNodePort: 3307

mysqlConnector:
  version: "8.0.33"

mode:
  type: Standalone
  repository:
    type: JDBC

rules:
  - !SHARDING
    tables:
      t_order:
        actualDataNodes: "shard_ds_${0..2}.t_order_${0..1}"
        databaseStrategy:
          standard:
            shardingColumn: order_id
            shardingAlgorithmName: t_order_inline
        tableStrategy:
          standard:
            shardingColumn: order_id
            shardingAlgorithmName: t_order_inline
        keyGenerateStrategy:
          column: order_id
          keyGeneratorName: snowflake
    bindingTables:
      - t_order
    defaultDatabaseStrategy:
      none:
    defaultTableStrategy:
      none:
    shardingAlgorithms:
      t_order_inline:
        type: INLINE
        props:
          algorithm-expression: "t_order_${order_id % 2}"
          allow-range-query-with-inline-sharding: false
    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          worker-id: 1

dataSources:
  shard_ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: "jdbc:mysql://mysql-shard-0:3306/shard0?useSSL=false&serverTimezone=UTC"
    username: root
    password: shard123
    maxPoolSize: 10
    minPoolSize: 2
  shard_ds_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: "jdbc:mysql://mysql-shard-1:3306/shard1?useSSL=false&serverTimezone=UTC"
    username: root
    password: shard123
    maxPoolSize: 10
    minPoolSize: 2
  shard_ds_2:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: "jdbc:mysql://mysql-shard-2:3306/shard2?useSSL=false&serverTimezone=UTC"
    username: root
    password: shard123
    maxPoolSize: 10
    minPoolSize: 2

resources:
  requests:
    memory: 512Mi
    cpu: 200m
  limits:
    memory: 1Gi
    cpu: 1
