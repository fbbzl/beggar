apiVersion: apps/v1
kind: Deployment
metadata:
  name: dubbo-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dubbo-admin
  template:
    metadata:
      labels:
        app: dubbo-admin
    spec:
      containers:
      - name: dubbo-admin
        image: apache/dubbo-admin:0.6.0
        ports:
        - containerPort: 8081
        env:
        - name: admin.registry.address
          value: zookeeper://zookeeper:2181
        - name: admin.config-center
          value: zookeeper://zookeeper:2181
        - name: admin.metadata-report.address
          value: zookeeper://zookeeper:2181
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dubbo-admin
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: dubbo-admin
