# MySQL 3-node 主从 (官方镜像, 无 Bitnami 依赖)
# 主: mysql-primary:3306
# 从: mysql-replica-0/1:3306
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-primary-config
data:
  my.cnf: |
    [mysqld]
    server-id=1
    log_bin=mysql-bin
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    binlog_gtid_simple_recovery=ON
    max_connections=200
    bind-address=0.0.0.0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-replica-config
data:
  my.cnf: |
    [mysqld]
    server-id=0
    log_bin=mysql-bin
    binlog_format=ROW
    gtid_mode=ON
    enforce_gtid_consistency=ON
    binlog_gtid_simple_recovery=ON
    max_connections=200
    bind-address=0.0.0.0
    relay_log=relay-log
    read_only=1
    super_read_only=1
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-primary
  labels:
    app: mysql
    role: primary
spec:
  ports:
    - port: 3306
      name: mysql
  selector:
    app: mysql
    role: primary
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-replica
  labels:
    app: mysql
    role: replica
spec:
  ports:
    - port: 3306
      name: mysql
  selector:
    app: mysql
    role: replica
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-primary
spec:
  serviceName: mysql-primary
  replicas: 1
  selector:
    matchLabels:
      app: mysql
      role: primary
  template:
    metadata:
      labels:
        app: mysql
        role: primary
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "mysqlroot123"
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: config
              mountPath: /etc/mysql/conf.d/custom.cnf
              subPath: my.cnf
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["mysqladmin", "-uroot", "-pmysqlroot123", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mysqladmin", "-uroot", "-pmysqlroot123", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 512Mi, cpu: 500m }
      volumes:
        - name: config
          configMap:
            name: mysql-primary-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-replica
spec:
  serviceName: mysql-replica
  replicas: 2
  selector:
    matchLabels:
      app: mysql
      role: replica
  template:
    metadata:
      labels:
        app: mysql
        role: replica
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "mysqlroot123"
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          command:
            - bash
            - -c
            - |
              set -e
              SERVER_ID=$(expr $(echo $HOSTNAME | grep -o '[0-9]*$') + 2)
              rm -rf /var/lib/mysql/.[!.]* /var/lib/mysql/* 2>/dev/null || true
              mkdir -p /var/lib/mysql /var/run/mysqld
              chown mysql:mysql /var/run/mysqld

              cat > /etc/mysql/conf.d/replica.cnf <<'EOF1'
              [mysqld]
              server-id=SERVER_ID_PLACEHOLDER
              log_bin=mysql-bin
              binlog_format=ROW
              gtid_mode=ON
              enforce_gtid_consistency=ON
              binlog_gtid_simple_recovery=ON
              relay_log=relay-log
              read_only=1
              max_connections=200
              bind-address=0.0.0.0
              socket=/var/run/mysqld/mysqld.sock
              EOF1
              sed -i "s/SERVER_ID_PLACEHOLDER/$SERVER_ID/" /etc/mysql/conf.d/replica.cnf

              mysqld --initialize-insecure --user=mysql --datadir=/var/lib/mysql
              rm -f /var/run/mysqld/mysqld.sock 2>/dev/null || true

              mysqld --defaults-file=/etc/mysql/conf.d/replica.cnf --user=mysql &
              MYSQL_PID=$!

              for i in $(seq 1 60); do
                if mysqladmin ping --silent 2>/dev/null; then break; fi
                sleep 2
              done

              mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY 'mysqlroot123';"
              mysql -uroot -pmysqlroot123 -e "
                STOP SLAVE;
                CHANGE MASTER TO
                  MASTER_HOST='mysql-primary',
                  MASTER_USER='repl',
                  MASTER_PASSWORD='repl123',
                  MASTER_AUTO_POSITION=1,
                  MASTER_SSL=0;
                START SLAVE;
                SET GLOBAL super_read_only=1;
              " 2>/dev/null || true

              wait $MYSQL_PID
          livenessProbe:
            exec:
              command: ["mysqladmin", "-uroot", "-pmysqlroot123", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mysqladmin", "-uroot", "-pmysqlroot123", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 512Mi, cpu: 500m }
      initContainers:
        - name: init-replica
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "mysqlroot123"
          command:
            - bash
            - -c
            - |
              for i in $(seq 1 30); do
                if mysqladmin ping -h mysql-primary -uroot -pmysqlroot123 --silent 2>/dev/null; then break; fi
                sleep 2
              done
              mysql -h mysql-primary -uroot -pmysqlroot123 -e "
              CREATE USER IF NOT EXISTS 'repl'@'%' IDENTIFIED WITH mysql_native_password BY 'repl123';
              ALTER USER 'repl'@'%' IDENTIFIED WITH mysql_native_password BY 'repl123';
              GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO 'repl'@'%';
                FLUSH PRIVILEGES;
              " 2>/dev/null || true
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
