apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-admin
  template:
    metadata:
      labels:
        app: spring-boot-admin
    spec:
      containers:
      - name: admin
        image: codecentric/spring-boot-admin-server:3.3.3
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-admin
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: spring-boot-admin
