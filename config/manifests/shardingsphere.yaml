---
# ── 3个分片 MySQL (standalone, 每个1副本) ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-shard-0
  labels:
    app: mysql-shard
    shard-id: "0"
spec:
  serviceName: mysql-shard-0
  replicas: 1
  selector:
    matchLabels:
      app: mysql-shard
      shard-id: "0"
  template:
    metadata:
      labels:
        app: mysql-shard
        shard-id: "0"
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "shard123"
            - name: MYSQL_DATABASE
              value: "shard0"
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 512Mi, cpu: 500m }
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-shard-0
  labels:
    app: mysql-shard
    shard-id: "0"
spec:
  ports:
    - port: 3306
      name: mysql
  selector:
    app: mysql-shard
    shard-id: "0"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-shard-1
  labels:
    app: mysql-shard
    shard-id: "1"
spec:
  serviceName: mysql-shard-1
  replicas: 1
  selector:
    matchLabels:
      app: mysql-shard
      shard-id: "1"
  template:
    metadata:
      labels:
        app: mysql-shard
        shard-id: "1"
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "shard123"
            - name: MYSQL_DATABASE
              value: "shard1"
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 512Mi, cpu: 500m }
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-shard-1
  labels:
    app: mysql-shard
    shard-id: "1"
spec:
  ports:
    - port: 3306
