---
# ── ShardingSphere-Proxy 配置 ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: shardingsphere-config
data:
  server.yaml: |
    mode:
      type: Standalone
      repository:
        type: JDBC
        props:
          jdbc_url: jdbc:h2:file:./data/sharding;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          jdbc_username: sa
          jdbc_password: ""

    rules:
      - !SHARDING
        tables:
          t_order:
            actualDataNodes: "shard_ds_${0..2}.t_order_${0..1}"
            tableStrategy:
              standard:
                shardingColumn: order_id
                shardingAlgorithmName: t_order_mod
            keyGenerateStrategy:
              column: order_id
              keyGeneratorName: snowflake
        shardingAlgorithms:
          t_order_mod:
            type: MOD
            props:
              sharding-count: 2
        keyGenerators:
          snowflake:
            type: SNOWFLAKE
            props:
              worker-id: 1

    dataSources:
      shard_ds_0:
        url: jdbc:mysql://mysql-shard-0:3306/shard0?useSSL=false&serverTimezone=UTC
        username: root
        password: shard123
        connectionTimeoutMilliseconds: 30000
        idleTimeoutMilliseconds: 60000
        maxLifetimeMilliseconds: 1800000
        maxPoolSize: 10
        minPoolSize: 2
      shard_ds_1:
        url: jdbc:mysql://mysql-shard-1:3306/shard1?useSSL=false&serverTimezone=UTC
        username: root
        password: shard123
        connectionTimeoutMilliseconds: 30000
        idleTimeoutMilliseconds: 60000
        maxLifetimeMilliseconds: 1800000
        maxPoolSize: 10
        minPoolSize: 2
      shard_ds_2:
        url: jdbc:mysql://mysql-shard-2:3306/shard2?useSSL=false&serverTimezone=UTC
        username: root
        password: shard123
        connectionTimeoutMilliseconds: 30000
        idleTimeoutMilliseconds: 60000
        maxLifetimeMilliseconds: 1800000
        maxPoolSize: 10
        minPoolSize: 2
---
# ── ShardingSphere-Proxy Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shardingsphere-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shardingsphere-proxy
  template:
    metadata:
      labels:
        app: shardingsphere-proxy
    spec:
      containers:
        - name: proxy
          image: apache/shardingsphere-proxy:5.5.0
          ports:
            - containerPort: 3307
              name: mysql
          env:
            - name: PORT
              value: "3307"
          volumeMounts:
            - name: config
              mountPath: /opt/shardingsphere-proxy/conf/server.yaml
              subPath: server.yaml
          startupProbe:
            tcpSocket:
              port: 3307
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3307
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { memory: 512Mi, cpu: 200m }
            limits:   { memory: 1Gi, cpu: 1 }
      volumes:
        - name: config
          configMap:
            name: shardingsphere-config
---
apiVersion: v1
kind: Service
metadata:
  name: shardingsphere-proxy
spec:
  type: NodePort
  ports:
    - port: 3307
      targetPort: 3307
      nodePort: 30307
  selector:
    app: shardingsphere-proxy
