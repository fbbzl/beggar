---
# 3-node RocketMQ NameServer
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-namesrv
spec:
  ports:
    - port: 9876
      name: namesrv
  clusterIP: None
  selector:
    app: rocketmq-namesrv
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-namesrv
spec:
  serviceName: rocketmq-namesrv
  replicas: 3
  selector:
    matchLabels:
      app: rocketmq-namesrv
  template:
    metadata:
      labels:
        app: rocketmq-namesrv
    spec:
      containers:
        - name: namesrv
          image: apache/rocketmq:5.2.0
          command: ["sh", "mqnamesrv"]
          ports:
            - containerPort: 9876
              name: namesrv
          env:
            - name: JAVA_OPT
              value: "-Xmx256M -Xms256M"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
# 3-node RocketMQ Broker (1 master + 2 replicas)
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker
  labels:
    app: rocketmq-broker
spec:
  ports:
    - port: 10909
      name: vip
    - port: 10911
      name: broker
    - port: 10912
      name: ha
  clusterIP: None
  selector:
    app: rocketmq-broker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-broker
spec:
  serviceName: rocketmq-broker
  replicas: 3
  selector:
    matchLabels:
      app: rocketmq-broker
  template:
    metadata:
      labels:
        app: rocketmq-broker
    spec:
      containers:
        - name: broker
          image: apache/rocketmq:5.2.0
          command: ["sh", "mqbroker"]
          args:
            - "-c"
            - "/etc/rocketmq/broker.conf"
          ports:
            - containerPort: 10909
              name: vip
            - containerPort: 10911
              name: broker
            - containerPort: 10912
              name: ha
          env:
            - name: NAMESRV_ADDR
              value: "rocketmq-namesrv:9876"
            - name: JAVA_OPT
              value: "-Xmx512M -Xms512M"
          volumeMounts:
            - name: config
              mountPath: /etc/rocketmq
            - name: store
              mountPath: /home/rocketmq/store
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 1
      volumes:
        - name: config
          configMap:
            name: rocketmq-broker-config
  volumeClaimTemplates:
    - metadata:
        name: store
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rocketmq-broker-config
data:
  broker.conf: |
    brokerClusterName = DefaultCluster
    brokerId = 0
    deleteWhen = 04
    fileReservedTime = 48
    flushDiskType = ASYNC_FLUSH
    autoCreateTopicEnable = true
    autoCreateSubscriptionGroup = true
    brokerRole = ASYNC_MASTER
    sendMessageThreadPoolNums = 4
    pullMessageThreadPoolNums = 4
    listenPort = 10911
    storePathRootDir = /home/rocketmq/store
    storePathCommitLog = /home/rocketmq/store/commitlog
---
# Expose NameServer via NodePort
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-namesrv-external
spec:
  type: NodePort
  ports:
    - port: 9876
      targetPort: 9876
      nodePort: 30010
  selector:
    app: rocketmq-namesrv
