apiVersion: apps/v1
kind: Deployment
metadata:
  name: seata-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seata-server
  template:
    metadata:
      labels:
        app: seata-server
    spec:
      containers:
      - name: seata-server
        image: apache/seata-server:2.6.0
        ports:
        - containerPort: 7091
        - containerPort: 8091
        env:
        - name: SEATA_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: STORE_MODE
          value: file
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: seata-server
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 7091
  - name: rpc
    port: 8091
    targetPort: 8091
  selector:
    app: seata-server
